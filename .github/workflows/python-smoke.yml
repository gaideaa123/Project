name: Python smoke tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
      XDG_CONFIG_HOME: ${{ runner.temp }}/xdg-config
      XDG_DATA_HOME: ${{ runner.temp }}/xdg-data
      XDG_CACHE_HOME: ${{ runner.temp }}/xdg-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile production modules
        run: |
          python -m py_compile app.py app_tr.py proxy_publisher.py proxy_health.py network_identity.py network_identity_gui.py sitecustomize.py
          python -m py_compile oauth_helper.py media_qa.py uniquizer_tab.py video_variants.py session_account_gui.py
          python -m py_compile antibot_resilience.py antibot_sandbox.py
          python -m py_compile web_uploader.py web_upload_engine.py web_gui_integration.py
          python -m py_compile utils/antibot_resilience.py utils/network_identity.py
          python -m py_compile playwright_interactions.py user_assisted_playwright.py
          python -m py_compile publication_guard.py test_publication_integration.py
      - name: Proxy integration smoke
        run: |
          python network_identity_smoke.py
          python risk_controls_smoke.py
          python proxy_health_false_negative_test.py
          python -c "import app_tr, proxy_publisher; assert hasattr(app_tr, 'TurkceAnaPencere')"
      - name: App TR layout startup smoke
        run: python layout_compat_smoke.py
      - name: Proxy, Cold Open and Session feature contract
        run: python feature_presence_contract_test.py
      - name: Core GUI smoke
        run: python smoke_test.py
      - name: Preflight smoke
        run: python preflight_smoke.py
      - name: Media QA smoke
        run: python media_qa_smoke.py
      - name: Defensive resilience smoke
        run: python antibot_resilience_smoke.py
      - name: Assisted interaction unit tests
        run: |
          python -m unittest -v test_human_interactions.py
          python -m unittest -v test_user_assisted_playwright.py
      - name: Zero-view risk gates
        run: python zero_view_risk_smoke.py
      - name: Publication integration tests
        run: python -m unittest -v test_publication_integration.py
