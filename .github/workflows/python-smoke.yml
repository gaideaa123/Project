name: Python smoke tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
      XDG_CONFIG_HOME: ${{ runner.temp }}/xdg-config
      XDG_DATA_HOME: ${{ runner.temp }}/xdg-data
      XDG_CACHE_HOME: ${{ runner.temp }}/xdg-cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile publication modules
        run: |
          python -m py_compile publication_guard.py web_upload_engine.py
          python -m py_compile test_publication_integration.py zero_view_risk_smoke.py
      - name: Core GUI smoke
        run: python smoke_test.py
      - name: Preflight smoke
        run: python preflight_smoke.py
      - name: Media QA smoke
        run: python media_qa_smoke.py
      - name: Defensive resilience smoke
        run: python antibot_resilience_smoke.py
      - name: Zero-view risk gates
        run: python zero_view_risk_smoke.py
      - name: Publication integration tests
        run: python -m unittest -v test_publication_integration.py
