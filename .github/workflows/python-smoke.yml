name: Python smoke tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python smoke_test.py
      - run: python preflight_smoke.py
      - run: python -m py_compile auto_publish_flow.py auto_publish_flow_test.py
      - name: Safe publish dialog regression
        shell: bash
        run: |
          set +e
          output=$(python auto_publish_flow_test.py 2>&1)
          code=$?
          printf '%s\n' "$output"
          if [ "$code" -ne 0 ]; then
            message=$(printf '%s' "$output" | tr '\n' ' ' | sed 's/%/%25/g')
            echo "::error title=Safe publish regression::$message"
            exit "$code"
          fi
      - run: python -m py_compile media_qa.py media_qa_smoke.py
      - run: python media_qa_smoke.py
      - run: python -m py_compile antibot_resilience.py antibot_resilience_smoke.py
      - run: python antibot_resilience_smoke.py
