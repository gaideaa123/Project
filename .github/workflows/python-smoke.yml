name: Python smoke tests
on:
  pull_request:
  push:
    branches: [main]
jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m compileall -q .
      - run: python risk_controls_smoke.py
      - run: python network_identity_smoke.py
      - run: python zero_view_risk_smoke.py
      - run: python assisted_mode_smoke.py
      - run: python session_publish_unit_tests.py
      - run: python smoke_test.py
      - run: python preflight_smoke.py
      - run: python media_qa_smoke.py
      - run: python antibot_resilience_smoke.py
      - run: python antibot_sandbox_smoke.py
