name: Python smoke tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile every Python module
        run: python -m compileall -q .
      - name: Runtime contracts
        run: python runtime_contract_smoke.py
      - name: Session bootstrap behavior
        run: python assisted_mode_smoke.py
      - name: Session unit tests
        run: python session_publish_unit_tests.py
      - name: Main GUI smoke
        run: python smoke_test.py
      - name: Preflight and audit smoke
        run: python preflight_smoke.py
      - name: Media QA smoke
        run: python media_qa_smoke.py
      - name: Anti-bot resilience smoke
        run: python antibot_resilience_smoke.py
      - name: Local sandbox smoke
        run: python antibot_sandbox_smoke.py
