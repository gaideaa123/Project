name: Python smoke tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Compile every Python module
        run: python -m compileall -q .
      - name: Core GUI smoke
        run: python smoke_test.py
      - name: Media preflight smoke
        run: python preflight_smoke.py
      - name: Uploader architecture contracts
        run: python architecture_contract_test.py
      - name: Media QA smoke
        run: python media_qa_smoke.py
      - name: Defensive anti-bot lab smoke
        run: python antibot_resilience_smoke.py
